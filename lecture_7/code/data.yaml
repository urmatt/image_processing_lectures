# Пример файла конфигурации датасета для YOLO (data.yaml)
# Этот файл нужен функции model.train(data='data.yaml')

# В Google Colab здесь пишут полные пути (например: /content/dataset/train/images)
train: ./train/images  # Относительный путь к папке с изображениями для обучения
val: ./valid/images    # Относительный путь к папке с фотографиями для проверки

nc: 1 # Количество классов (например, 1 - если мы ищем только ваш студенческий билет)

# Названия классов. Порядок важен! В данном случае "id_card" имеет номер 0.
names: 
  - my_id_card
